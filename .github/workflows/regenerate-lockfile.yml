name: Regenerate Frontend Lockfile

on:
  workflow_dispatch:

jobs:
  regenerate:
    name: Regenerate pnpm-lock.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Regenerate lockfile
        run: |
          rm -f pnpm-lock.yaml
          pnpm install --no-frozen-lockfile

      - name: Verify lock created at root
        run: |
          ls -lh pnpm-lock.yaml
          wc -l pnpm-lock.yaml

      - name: Show resolved versions
        run: |
          echo "--- next ---"
          grep "next@" pnpm-lock.yaml | head -5
          echo "--- vite ---"
          grep "vite@" pnpm-lock.yaml | head -5
          echo "--- postcss ---"
          grep "postcss@" pnpm-lock.yaml | head -5
          echo "--- form-data ---"
          grep "form-data@" pnpm-lock.yaml | head -5
          echo "--- js-yaml ---"
          grep "js-yaml@" pnpm-lock.yaml | head -5

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate pnpm-lock.yaml with patched deps [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
