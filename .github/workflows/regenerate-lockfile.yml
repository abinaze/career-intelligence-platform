name: Regenerate Frontend Lockfile

on:
  workflow_dispatch:

jobs:
  regenerate:
    name: Regenerate pnpm-lock.yaml
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Copy overrides into frontend package.json then regenerate
        working-directory: apps/frontend
        run: |
          rm -f pnpm-lock.yaml
          node -e "
            const fs = require('fs');
            const root = JSON.parse(fs.readFileSync('../../package.json'));
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.pnpm = root.pnpm;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
            console.log('Copied overrides:', JSON.stringify(root.pnpm));
          "
          pnpm install --no-frozen-lockfile

      - name: Show resolved versions
        working-directory: apps/frontend
        run: |
          echo "--- next ---"
          grep "next@" pnpm-lock.yaml | head -5
          echo "--- vite ---"
          grep "vite@" pnpm-lock.yaml | head -5
          echo "--- postcss ---"
          grep "postcss@" pnpm-lock.yaml | head -5
          echo "--- form-data ---"
          grep "form-data@" pnpm-lock.yaml | head -5
          echo "--- js-yaml ---"
          grep "js-yaml@" pnpm-lock.yaml | head -5

      - name: Commit and push regenerated lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -- apps/frontend/package.json
          git add apps/frontend/pnpm-lock.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate pnpm-lock.yaml with patched transitive deps [skip ci]"
            git push origin HEAD:${{ github.ref_name }}
          fi
