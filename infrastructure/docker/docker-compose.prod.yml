# Self-hosted production compose file — an alternative to the
# Vercel + Hugging Face Spaces + Supabase free-tier path documented in
# docs/deployment/guide.md, for anyone who'd rather run everything on
# their own VPS/server instead. Not what Phase 10 was primarily built
# for, but the free-tier guide had explicitly flagged this as a missing
# piece ("A dedicated docker-compose.prod.yml tying all of this together
# is tracked for a future release"), so it's included now rather than
# left as a stale TODO.
#
# Unlike docker-compose.dev.yml, this targets each service's `production`
# stage, uses real (non-bind-mount) volumes, and expects all secrets via
# a .env file next to this one — see docs/deployment/guide.md's
# "Self-hosting instead" section for the full walkthrough.
#
# Usage: docker compose -f infrastructure/docker/docker-compose.prod.yml --env-file infrastructure/docker/.env.production up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: cip-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-cip_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - cip-prod-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Not published to the host — only `backend` talks to this,
    # over the internal network. Remove this line if you need external
    # access (e.g. for a one-off `alembic` run from your own machine).

  redis:
    image: redis:7-alpine
    container_name: cip-redis-prod
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    volumes:
      - redis_prod_data:/data
    networks:
      - cip-prod-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ../../apps/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.backend
      target: production
    image: cip-backend:prod
    container_name: cip-backend-prod
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-cip_db}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD}@redis:6379/2
      ENVIRONMENT: production
      # Everything else (SECRET_KEY, ANTHROPIC_API_KEY, GOOGLE_/MICROSOFT_/
      # DROPBOX_ CLIENT_ID+SECRET, FRONTEND_URL, the *_REDIRECT_URI vars)
      # comes from the env_file below — see .env.production.example.
    env_file:
      - .env.production
    volumes:
      - faiss_data_prod:/app/data/faiss
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cip-prod-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
      target: production
    image: cip-frontend:prod
    container_name: cip-frontend-prod
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:?NEXT_PUBLIC_API_URL is required — the public URL backend will be reachable at}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?NEXT_PUBLIC_APP_URL is required — the public URL this frontend will be reachable at}
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cip-prod-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: cip-nginx-prod
    restart: unless-stopped
    volumes:
      # nginx.conf is a server-block fragment (no events{}/http{}
      # wrapper) — it belongs in conf.d, not at /etc/nginx/nginx.conf
      # directly, which would replace the whole base config nginx needs
      # to actually start. See the file's own header comment.
      - ../nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      # Add a 443 mapping + TLS cert volumes here once you've put a real
      # certificate in front of this (certbot, or terminate TLS at a
      # cloud load balancer in front of the VPS instead — either works,
      # neither is set up by default here).
    depends_on:
      - backend
      - frontend
    networks:
      - cip-prod-network

networks:
  cip-prod-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
  faiss_data_prod:
