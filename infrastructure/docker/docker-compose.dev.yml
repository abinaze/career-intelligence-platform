version: "3.9"

name: cip-dev

networks:
  cip-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  faiss_data:
    driver: local

services:
  # ── PostgreSQL 16 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: cip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: cip_db
      POSTGRES_USER: cip_user
      POSTGRES_PASSWORD: cip_password
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - cip-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cip_user -d cip_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Redis 7 ───────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: cip-redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --appendfsync everysec
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - cip-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────────────────────────
  # Only started with `make docker-up` (--profile full).
  # For everyday development, run the backend on the host with
  # `uv run uvicorn src.main:app --reload` against these same containers.
  backend:
    build:
      # Dockerfile.backend's COPY paths (pyproject.toml, then `.` into
      # /app) assume the build context IS apps/backend — not repo root.
      # Compose resolves `context` relative to *this file's* location
      # (infrastructure/docker/), so this has to go up two levels and
      # back down into apps/backend, not just "." (which previously
      # resolved to infrastructure/docker/ itself — pyproject.toml was
      # never found there, so this build never actually worked). Same
      # reasoning for `dockerfile:`, which is resolved relative to
      # `context:`.
      context: ../../apps/backend
      dockerfile: ../../infrastructure/docker/Dockerfile.backend
      target: development
    container_name: cip-backend
    restart: unless-stopped
    profiles: ["full"]
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgresql+asyncpg://cip_user:cip_password@postgres:5432/cip_db
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      # Matches the Dockerfile's WORKDIR /app + COPY . . — the backend
      # source lands directly at /app, not /app/apps/backend.
      - ./apps/backend:/app
      - faiss_data:/app/data/faiss
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - cip-network
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/health').raise_for_status()"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 20s

  # ── Frontend (Next.js) ───────────────────────────────────────────────────────
  # Only started with `make docker-up` (--profile full).
  frontend:
    build:
      # Dockerfile.frontend's COPY paths assume the build context IS repo
      # root (it reads pnpm-workspace.yaml, packages/, apps/frontend/ —
      # all repo-root-relative). "." here resolves relative to this
      # file's own location (infrastructure/docker/), so it has to go up
      # two levels to actually reach repo root.
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.frontend
      target: development
    container_name: cip-frontend
    restart: unless-stopped
    profiles: ["full"]
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      NEXT_PUBLIC_APP_URL: http://localhost:3000
    volumes:
      - ./apps/frontend:/app/apps/frontend
      - /app/apps/frontend/node_modules
      - /app/apps/frontend/.next
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - cip-network
