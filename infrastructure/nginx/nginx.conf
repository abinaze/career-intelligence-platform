# Career Intelligence Platform — Production reverse proxy
#
# Routes:
#   /api/*  -> backend  (FastAPI, container port 8000)
#   /*      -> frontend (Next.js, container port 3000)
#
# Usage: mount this file at /etc/nginx/conf.d/default.conf in the nginx
# container of your production docker-compose file, or adapt paths for
# a bare-metal nginx install.

upstream backend_upstream {
    server backend:8000;
    keepalive 32;
}

upstream frontend_upstream {
    server frontend:3000;
    keepalive 32;
}

# Rate limiting zone — 60 requests/min per IP, matching backend RATE_LIMIT_PER_MINUTE
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=60r/m;

server {
    listen 80;
    server_name _;

    client_max_body_size 10M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    gzip_min_length 1000;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ── Backend API ────────────────────────────────────────────────────────────
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Backend health check and docs — no rate limit
    location ~ ^/(health|docs|redoc|openapi\.json)$ {
        proxy_pass http://backend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Frontend (Next.js) ───────────────────────────────────────────────────────
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Next.js static assets — long cache, immutable
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        proxy_set_header Host $host;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
